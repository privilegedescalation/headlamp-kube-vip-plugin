name: Promotion Gate

# dev PRs: no gate (engineer self-merges).
# uat PRs: QA approval required.
# main PRs: UAT approval required (uat→main promotions).

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    branches: [uat, main]
    types: [opened, reopened, synchronize]

# Cancel any in-progress gate run for the same PR when a new event fires.
concurrency:
  group: promotion-gate-${{ github.event.pull_request.number || 'no-pr' }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  promotion-gate:
    # Name differs from 'Promotion Gate' so the auto check-run does not collide
    # with the single canonical check-run this job manages via the Checks API.
    # Branch protection requires 'Promotion Gate', which is satisfied by the
    # API-created check-run below — not by this job's auto check-run.
    name: promotion-gate-runner
    runs-on: ubuntu-latest
    container: ubuntu:latest
    timeout-minutes: 5

    steps:
      # Create (or re-open) one canonical 'Promotion Gate' check-run per PR head
      # SHA, identified by external_id so subsequent events find and update the
      # same run in-place.  API-created check-runs are updatable by the same token;
      # auto-created GitHub Actions check-runs are not (platform restriction since
      # 2025-02-12).  JavaScript actions run on the runner host, not in the container.
      - name: Initialize canonical Promotion Gate check-run
        id: gate-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.payload.pull_request?.head?.sha;
            if (!sha) {
              core.setOutput('check_run_id', '');
              core.info('No PR payload — skipping check-run management.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const externalId = `promotion-gate-pr-${prNumber}`;

            // Find the API-managed check-run we own (identified by external_id).
            // GitHub Actions auto-created runs have no external_id and cannot be
            // updated — this only matches runs we created via checks.create.
            const { data } = await github.rest.checks.listForRef({
              owner, repo,
              ref: sha,
              check_name: 'Promotion Gate',
              filter: 'all',
              per_page: 100,
            });

            const existing = data.check_runs.find(r => r.external_id === externalId);

            let checkRunId;
            if (existing) {
              core.info(`Re-opening existing check-run ${existing.id} for re-evaluation.`);
              await github.rest.checks.update({
                owner, repo,
                check_run_id: existing.id,
                status: 'in_progress',
              });
              checkRunId = existing.id;
            } else {
              core.info(`Creating canonical check-run for PR #${prNumber} at ${sha}.`);
              const { data: created } = await github.rest.checks.create({
                owner, repo,
                name: 'Promotion Gate',
                head_sha: sha,
                external_id: externalId,
                status: 'in_progress',
              });
              checkRunId = created.id;
            }

            core.setOutput('check_run_id', String(checkRunId));

      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends ca-certificates curl jq

      - name: Check promotion approval
        id: approval
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "::notice::No PR number in context. Skipping promotion gate."
            exit 0
          fi

          # On pull_request_review events github.base_ref is empty; resolve via API.
          if [ -z "${BASE_REF}" ] && [ -n "${PR_NUMBER}" ] && [ "${PR_NUMBER}" != "null" ]; then
            BASE_REF=$(curl -sf \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}" | jq -r '.base.ref')
            echo "Resolved BASE_REF from GitHub API: ${BASE_REF}"
          fi

          echo "Checking promotion gate for PR #${PR_NUMBER} targeting ${BASE_REF} in ${REPO}"

          # Determine required reviewer based on target branch
          case "${BASE_REF}" in
            dev)
              echo "Target is dev — no review required. Engineers self-merge."
              exit 0
              ;;
            uat)
              REQUIRED_REVIEWER="regression-regina-pe[bot]"
              GATE_NAME="QA"
              ;;
            main)
              REQUIRED_REVIEWER="regression-regina-pe[bot]"
              GATE_NAME="QA"
              # For plugin repos (Pipeline A), UAT approval is needed for uat→main
              SOURCE_REF=$(curl -sf \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}" | jq -r '.head.ref')

              if [ "${SOURCE_REF}" = "uat" ]; then
                REQUIRED_REVIEWER="pixel-patty-pe[bot]"
                GATE_NAME="UAT"
              fi
              ;;
            *)
              echo "::notice::Target branch '${BASE_REF}' has no promotion gate configured."
              exit 0
              ;;
          esac

          echo "Required reviewer: ${REQUIRED_REVIEWER} (${GATE_NAME})"

          # For uat→main promotions, pixel-patty-pe may not be able to review.
          # Accept null-pointer-nancy-pe (CTO) as a valid alternative reviewer.
          ALT_REVIEWER=""
          if [ "${REQUIRED_REVIEWER}" = "pixel-patty-pe[bot]" ]; then
            ALT_REVIEWER="null-pointer-nancy-pe[bot]"
          fi

          PR_DATA=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}")

          PR_AUTHOR=$(printf '%s' "${PR_DATA}" | jq -r '.user.login')
          echo "PR author: ${PR_AUTHOR}"

          # Guard: PR author matches required reviewer — gate cannot be satisfied.
          if [ "${PR_AUTHOR}" = "${REQUIRED_REVIEWER}" ] || [ "${PR_AUTHOR}" = "app/${REQUIRED_REVIEWER%\[bot\]}" ]; then
            echo "::error::PR author (${PR_AUTHOR}) is the required reviewer (${REQUIRED_REVIEWER}). GitHub prevents self-approval. The PR must be re-authored under a different identity."
            exit 1
          fi

          REVIEWS=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/reviews")

          if [ -z "${REVIEWS}" ] || [ "${REVIEWS}" = "null" ]; then
            echo "::warning::Could not fetch reviews for PR #${PR_NUMBER}."
            exit 1
          fi

          REVIEWER_APPROVED=$(printf '%s' "${REVIEWS}" | jq -r --arg user "${REQUIRED_REVIEWER}" \
            '[.[] | select(.user.login == $user)] | last | if .state then .state == "APPROVED" else false end')

          echo "${GATE_NAME} (${REQUIRED_REVIEWER}) approved: ${REVIEWER_APPROVED}"

          # Fallback: check if CTO approved as alternative for uat→main
          if [ "${REVIEWER_APPROVED}" != "true" ] && [ -n "${ALT_REVIEWER}" ]; then
            REVIEWER_APPROVED=$(printf '%s' "${REVIEWS}" | jq -r --arg user "${ALT_REVIEWER}" \
              '[.[] | select(.user.login == $user)] | last | if .state then .state == "APPROVED" else false end')
            if [ "${REVIEWER_APPROVED}" = "true" ]; then
              echo "CTO (${ALT_REVIEWER}) approved as fallback for UAT gate."
            fi
          fi

          if [ "${REVIEWER_APPROVED}" = "true" ]; then
            echo "Promotion gate passed: ${GATE_NAME} has approved."
          else
            echo "Promotion gate failed: waiting for ${GATE_NAME} approval from ${REQUIRED_REVIEWER}."
            exit 1
          fi

      # Always write the final result back to the canonical check-run, even on failure.
      - name: Finalize canonical Promotion Gate check-run
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkRunId = '${{ steps.gate-check.outputs.check_run_id }}';
            const passed = '${{ steps.approval.outcome }}' === 'success';

            if (!checkRunId) {
              core.info('No check-run ID — cannot update canonical check-run.');
              if (!passed) core.setFailed('Promotion gate failed: waiting for approval.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.rest.checks.update({
              owner, repo,
              check_run_id: parseInt(checkRunId),
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              output: {
                title: passed ? 'Promotion gate passed' : 'Promotion gate failed',
                summary: passed
                  ? 'Required reviewer has approved this PR.'
                  : 'Waiting for required reviewer approval.',
              },
            });

            if (!passed) {
              core.setFailed('Promotion gate failed: waiting for approval.');
            }
