name: Promotion Gate

# dev PRs: no gate (engineer self-merges).
# uat PRs: QA approval required.
# main PRs: UAT approval required (uat→main promotions).

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    branches: [uat, main]
    types: [opened, reopened, synchronize]

# Cancel any in-progress gate run for the same PR when a new event fires.
# Superseded runs become 'cancelled' (not 'failed'), so they do not persist
# as required-check failures that block the merge.
concurrency:
  group: promotion-gate-${{ github.event.pull_request.number || 'no-pr' }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  promotion-gate:
    name: Promotion Gate
    runs-on: ubuntu-latest
    container: ubuntu:latest
    timeout-minutes: 5

    steps:
      # Neutralize any prior completed non-passing 'Promotion Gate' check-runs on the
      # PR head SHA so they do not persist as required-check failures after approval.
      # Two details that matter:
      #   - context.sha is the merge commit, not the PR head; use payload instead.
      #   - neutralize ALL non-success conclusions (failure, cancelled, timed_out …)
      #     because cancel-in-progress produces 'cancelled' runs that also block merges.
      # JavaScript actions run on the runner host, unaffected by the container setting.
      - name: Neutralize stale non-passing gate check-runs on this PR head SHA
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // context.sha is the merge commit and differs per event type — use the
            // PR head SHA where check-runs actually live.
            const sha = context.payload.pull_request?.head?.sha;
            if (!sha) {
              core.info('No pull_request payload — skipping neutralization.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data } = await github.rest.checks.listForRef({
              owner, repo,
              ref: sha,
              check_name: 'Promotion Gate',
              filter: 'all',
              per_page: 100,
            });

            let neutralized = 0;
            for (const run of data.check_runs) {
              if (run.status !== 'completed') continue;  // skip own in-progress run
              if (run.conclusion === 'success') continue; // keep passing runs
              core.info(`Neutralizing stale check-run ${run.id} (was: ${run.conclusion})`);
              await github.rest.checks.update({
                owner, repo,
                check_run_id: run.id,
                status: 'completed',
                conclusion: 'neutral',
                output: {
                  title: 'Superseded by newer evaluation',
                  summary: 'This check-run was superseded by a later Promotion Gate run and no longer counts toward required checks.',
                },
              });
              neutralized++;
            }
            core.info(`Neutralized ${neutralized} stale check-run(s) on ${sha}.`);

      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends ca-certificates curl jq

      - name: Check promotion approval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "::notice::No PR number in context. Skipping promotion gate."
            exit 0
          fi

          # On pull_request_review events github.base_ref is empty; resolve via API.
          if [ -z "${BASE_REF}" ] && [ -n "${PR_NUMBER}" ] && [ "${PR_NUMBER}" != "null" ]; then
            BASE_REF=$(curl -sf \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}" | jq -r '.base.ref')
            echo "Resolved BASE_REF from GitHub API: ${BASE_REF}"
          fi

          echo "Checking promotion gate for PR #${PR_NUMBER} targeting ${BASE_REF} in ${REPO}"

          # Determine required reviewer based on target branch
          case "${BASE_REF}" in
            dev)
              echo "Target is dev — no review required. Engineers self-merge."
              exit 0
              ;;
            uat)
              REQUIRED_REVIEWER="regression-regina-pe[bot]"
              GATE_NAME="QA"
              ;;
            main)
              REQUIRED_REVIEWER="regression-regina-pe[bot]"
              GATE_NAME="QA"
              # For plugin repos (Pipeline A), UAT approval is needed for uat→main
              SOURCE_REF=$(curl -sf \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}" | jq -r '.head.ref')

              if [ "${SOURCE_REF}" = "uat" ]; then
                REQUIRED_REVIEWER="pixel-patty-pe[bot]"
                GATE_NAME="UAT"
              fi
              ;;
            *)
              echo "::notice::Target branch '${BASE_REF}' has no promotion gate configured."
              exit 0
              ;;
          esac

          echo "Required reviewer: ${REQUIRED_REVIEWER} (${GATE_NAME})"

          # For uat→main promotions, pixel-patty-pe may not be able to review.
          # Accept null-pointer-nancy-pe (CTO) as a valid alternative reviewer.
          ALT_REVIEWER=""
          if [ "${REQUIRED_REVIEWER}" = "pixel-patty-pe[bot]" ]; then
            ALT_REVIEWER="null-pointer-nancy-pe[bot]"
          fi

          PR_DATA=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}")

          PR_AUTHOR=$(printf '%s' "${PR_DATA}" | jq -r '.user.login')
          echo "PR author: ${PR_AUTHOR}"

          # Guard: PR author matches required reviewer — gate cannot be satisfied.
          if [ "${PR_AUTHOR}" = "${REQUIRED_REVIEWER}" ] || [ "${PR_AUTHOR}" = "app/${REQUIRED_REVIEWER%\[bot\]}" ]; then
            echo "::error::PR author (${PR_AUTHOR}) is the required reviewer (${REQUIRED_REVIEWER}). GitHub prevents self-approval. The PR must be re-authored under a different identity."
            exit 1
          fi

          REVIEWS=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/reviews")

          if [ -z "${REVIEWS}" ] || [ "${REVIEWS}" = "null" ]; then
            echo "::warning::Could not fetch reviews for PR #${PR_NUMBER}."
            exit 1
          fi

          REVIEWER_APPROVED=$(printf '%s' "${REVIEWS}" | jq -r --arg user "${REQUIRED_REVIEWER}" \
            '[.[] | select(.user.login == $user)] | last | if .state then .state == "APPROVED" else false end')

          echo "${GATE_NAME} (${REQUIRED_REVIEWER}) approved: ${REVIEWER_APPROVED}"

          # Fallback: check if CTO approved as alternative for uat→main
          if [ "${REVIEWER_APPROVED}" != "true" ] && [ -n "${ALT_REVIEWER}" ]; then
            REVIEWER_APPROVED=$(printf '%s' "${REVIEWS}" | jq -r --arg user "${ALT_REVIEWER}" \
              '[.[] | select(.user.login == $user)] | last | if .state then .state == "APPROVED" else false end')
            if [ "${REVIEWER_APPROVED}" = "true" ]; then
              echo "CTO (${ALT_REVIEWER}) approved as fallback for UAT gate."
            fi
          fi

          if [ "${REVIEWER_APPROVED}" = "true" ]; then
            echo "Promotion gate passed: ${GATE_NAME} has approved."
          else
            echo "Promotion gate failed: waiting for ${GATE_NAME} approval from ${REQUIRED_REVIEWER}."
            exit 1
          fi
